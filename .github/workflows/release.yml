name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests zstandard python-gnupg pyinstaller

      - name: Build binary
        run: |
          make build

      - name: Generate SHA256
        run: |
          sha256sum dist/sven > dist/SHA256SUMS

      - name: Rename binary
        run: |
          mv dist/sven dist/sven-x86_64-linux

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/sven-x86_64-linux
            dist/SHA256SUMS
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update AUR PKGBUILD checksums
        run: |
          # The binary is out, modify PKGBUILD with its actual shasum
          CSUM=$(cat dist/SHA256SUMS | awk '{print $1}')
          sed -i "s/sha256sums=('SKIP')/sha256sums=('${CSUM}')/" PKGBUILD
          sed -i "s/pkgver=.*/pkgver=${GITHUB_REF_NAME#v}/" PKGBUILD

      - name: Publish AUR Package (sven-bin)
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: sven-bin
          pkgbuild: ./PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Release ${{ github.ref_name }}"
